<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca | MangaScan</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="nav">
                <div class="logo">Manga<span>Scan</span></div>
                <ul class="nav-links">
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="biblioteca.html">Biblioteca</a></li>
                    <li><a href="about.html">Nosotros</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                </ul>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Buscar manga..." value="">
                    <button onclick="searchManga()">🔍</button>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <section class="section">
            <div class="container">
                <h1 class="section-title">📚 Biblioteca Completa</h1>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-genre="todos">Todos</button>
                    <button class="filter-btn" data-genre="Comedia">Comedia</button>
                    <button class="filter-btn" data-genre="Romance">Romance</button>
                    <button class="filter-btn" data-genre="Recuentos de la vida">Recuentos de vida</button>
                </div>
                <div class="manga-grid" id="allMangas"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2024 MangaScan - Scanlation en Español</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        loadAllMangas();
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const genre = btn.dataset.genre;
                filterMangasByGenre(genre);
            });
        });
        
        function searchManga() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            filterMangasBySearch(query);
        }
        
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchManga();
        });
        
        const urlParams = new URLSearchParams(window.location.search);
        const searchQuery = urlParams.get('search');
        if (searchQuery) {
            document.getElementById('searchInput').value = searchQuery;
            filterMangasBySearch(searchQuery);
        }
    </script>
</body>
</html>

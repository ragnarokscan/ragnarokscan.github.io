<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio | MangaScan</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="nav">
                <div class="logo">Manga<span>Scan</span></div>
                <ul class="nav-links">
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="biblioteca.html">Biblioteca</a></li>
                    <li><a href="about.html">Nosotros</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                </ul>

                    <input type="text" id="searchInput" placeholder="Buscar manga...">
                    <button onclick="searchManga()">🔍</button>

        </div>
    </header>

    <main>
        <section class="hero">

                <p>Leer mangas traducidos al español - Actualizaciones diarias</p>
            </div>
        </section>

        <section class="section">

                <h2 class="section-title">🆕 Últimos Capítulos</h2>
                <div class="recent-list" id="recentChapters">

                </div>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <h2 class="section-title">🔥 Mangas Populares</h2>
                <div class="manga-grid" id="popularMangas">
                    <!-- Se carga con JS -->
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2024 MangaScan - Scanlation en Español</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        // Cargar datos al inicio
        loadRecentChapters();
        loadPopularMangas();
    </script>
